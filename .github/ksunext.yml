name: Compilar Kernel S5E9945 (KSU-Next + susfs)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Preparar el entorno (Instalar dependencias)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc git curl zip unzip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
        
    - name: Clonar el código del Kernel
      uses: actions/checkout@v4
      with:
        path: kernel_workspace
        
    - name: Descargar Toolchain (Proton Clang)
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang toolchain

    - name: Inyectar KernelSU-Next y Parches susfs
      run: |
        cd kernel_workspace
        
        # 1. Inyectar KernelSU-Next
        curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -
        
        # 2. Descargar repositorio oficial de susfs
        cd ..
        git clone https://gitlab.com/simonpunk/susfs4ksu.git susfs
        cd kernel_workspace
        
        # 3. Copiar archivos clave de susfs al código fuente de tu kernel
        cp ../susfs/kernel_patches/fs/susfs.c fs/
        cp ../susfs/kernel_patches/include/linux/susfs.h include/linux/
        
        # 4. Parchear KernelSU-Next para habilitar soporte susfs
        patch -p1 < ../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch
        
        # Nota: La integración completa de susfs a veces requiere parchear archivos core de Linux (como dcache.c). 
        # Si la compilación falla más adelante por temas de VFS, se deberán aplicar los parches específicos de susfs manualmente.

    - name: Compilar el Kernel
      run: |
        cd kernel_workspace
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
        
        # Generar la configuración
        make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 s5e9945_gki_defconfig
        
        # Iniciar compilación
        make -j$(nproc) O=out \
                      ARCH=arm64 \
                      CC=clang \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                      LLVM=1 \
                      LLVM_IAS=1
                      
    - name: Subir el Kernel compilado (Image)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Compilado-KSUNext-susfs
        path: kernel_workspace/out/arch/arm64/boot/Image
