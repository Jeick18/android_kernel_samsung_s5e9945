name: Compilar Kernel Samsung S5E9945

on:
  workflow_dispatch: # Te permite iniciar la compilación manualmente

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Preparar el entorno (Instalar dependencias)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc git curl zip unzip
        
    - name: Clonar el código del Kernel
      uses: actions/checkout@v3
      with:
        path: kernel_workspace
        
    - name: Descargar Toolchain (Proton Clang)
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang toolchain
        
    - name: Compilar el Kernel
      run: |
        cd kernel_workspace
        # VARIABLES IMPORTANTES - Debes cambiar el defconfig
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang
        
        # 1. Configurar
        make O=out vendor/s5e9945_gki_defconfig
        
        # 2. Iniciar compilación
        make -j$(nproc) O=out \
                      ARCH=arm64 \
                      CC=clang \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi-
                      
    - name: Subir el Kernel compilado (Image)
      uses: actions/upload-artifact@v3
      with:
        name: Kernel-Compilado
        path: kernel_workspace/out/arch/arm64/boot/Image
