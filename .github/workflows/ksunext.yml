name: Compilar Kernel S5E9945 (KSU-Next + Fix de Samsung)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Preparar el entorno (Instalar dependencias)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc git curl zip unzip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
        
    - name: Clonar el código del Kernel
      uses: actions/checkout@v4
      with:
        path: kernel_workspace
        
    - name: Descargar Toolchain (Proton Clang)
      run: |
        # Volvemos a Proton Clang que es público y estable
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain

    - name: Inyectar KernelSU-Next
      run: |
        cd kernel_workspace
        curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -

    - name: Compilar el Kernel
      run: |
        cd kernel_workspace
        export ARCH=arm64
        export SUBARCH=arm64
        
        # EL FIX CLAVE PARA LOS KERNELS DE SAMSUNG:
        export TARGET_SOC="s5e9945"
        
        export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
        
        # 1. Generar la configuración
        make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 s5e9945_gki_defconfig
        
        # 2. Iniciar compilación
        make -j$(nproc) O=out \
                      ARCH=arm64 \
                      CC=clang \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                      LLVM=1 \
                      LLVM_IAS=1
                      
    - name: Subir el Kernel compilado (Image)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Compilado-KSUNext
        path: kernel_workspace/out/arch/arm64/boot/Image
