name: Compilar Kernel Samsung S5E9945 (Exynos 2400e + KernelSU)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Preparar el entorno (Instalar dependencias)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc git curl zip unzip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
        
    - name: Clonar el código del Kernel
      uses: actions/checkout@v4
      with:
        path: kernel_workspace
        
    - name: Descargar Toolchain (Proton Clang)
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang toolchain

    - name: Inyectar KernelSU (Última versión) en el código
      run: |
        cd kernel_workspace
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
        
    - name: Compilar el Kernel
      run: |
        cd kernel_workspace
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
        
        # 1. Generar la configuración (Ahora con las variables de Clang y LLVM)
        make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 s5e9945_gki_defconfig
        
        # 2. Iniciar compilación
        make -j$(nproc) O=out \
                      ARCH=arm64 \
                      CC=clang \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                      LLVM=1 \
                      LLVM_IAS=1
                      
    - name: Subir el Kernel compilado (Image)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Compilado-KSU
        path: kernel_workspace/out/arch/arm64/boot/Image
